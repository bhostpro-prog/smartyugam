<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGCSE Faculty Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b14;--s1:#13121f;--s2:#1c1b2e;--s3:#2a2845;
  --accent:#6c63ff;--ag:rgba(108,99,255,.18);
  --gold:#f5c842;--green:#2ecc8a;--red:#ff5b5b;--sky:#5bbfff;--pink:#ff6bd6;--orange:#ff8c42;
  --text:#f0effe;--muted:#7b7a9a;--border:rgba(255,255,255,.08);
  --ff-h:'Syne',sans-serif;--ff-b:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ff-b)}

/* Auto-detect: no mode selector needed */

/* ── PROJECTOR SHELL ── */
#projector{display:none;flex-direction:column;height:100vh}
#top-nav{display:flex;align-items:center;background:var(--s1);border-bottom:1px solid var(--border);padding:0 10px;height:46px;gap:5px;flex-shrink:0;overflow-x:auto}
.sess-pill{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:700;font-family:var(--ff-h);letter-spacing:.05em;white-space:nowrap;cursor:pointer;transition:all .2s;flex-shrink:0}
.sess-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sess-pill.d2.active{background:var(--green);border-color:var(--green)}
.sess-pill.demo.active{background:var(--gold);border-color:var(--gold);color:#000}
#stage{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;padding:28px 34px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;transform:translateX(30px)}
.slide.active{opacity:1;pointer-events:all;transform:none}
#bot-nav{display:flex;align-items:center;justify-content:space-between;background:var(--s1);border-top:1px solid var(--border);padding:7px 14px;flex-shrink:0}
.nav-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:var(--ff-h);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--s3)}
.nav-btn.primary{background:var(--accent);border-color:var(--accent)}
#slide-counter{font-family:var(--ff-h);font-size:12px;color:var(--muted)}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:600}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

/* ── SLIDE TYPES ── */
.slide-title{background:radial-gradient(ellipse at 30% 50%,rgba(108,99,255,.22),transparent 60%),var(--bg);justify-content:center;align-items:center;text-align:center}
.slide-title .eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.slide-title h1{font-family:var(--ff-h);font-size:clamp(26px,5vw,52px);font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:12px}
.slide-title h1 span{background:linear-gradient(135deg,var(--accent),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.slide-title .tagline{font-size:13px;color:var(--muted);max-width:480px;line-height:1.7}
.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:16px}
.chip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--border);color:var(--muted)}

.slide-section{background:linear-gradient(135deg,var(--s2),var(--s1));justify-content:center;position:relative}
.sect-num{font-family:var(--ff-h);font-size:clamp(60px,12vw,110px);font-weight:800;line-height:1;opacity:.07;position:absolute;right:30px;top:50%;transform:translateY(-50%)}
.sect-eye{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.sect-title{font-family:var(--ff-h);font-size:clamp(20px,4vw,38px);font-weight:800;line-height:1.15;letter-spacing:-1px;margin-bottom:8px}
.sect-sub{font-size:13px;color:var(--muted);line-height:1.6}
.dur-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-top:12px;background:var(--ag);color:var(--accent);border:1px solid rgba(108,99,255,.3)}

.slide-content h2{font-family:var(--ff-h);font-size:clamp(16px,2.8vw,26px);font-weight:800;letter-spacing:-.5px;margin-bottom:16px;line-height:1.2}
.slide-content h2 .hl{color:var(--accent)}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.col-box{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px}
.col-box h3{font-family:var(--ff-h);font-size:12px;font-weight:700;margin-bottom:8px}
.col-box ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.col-box ul li{font-size:11px;color:var(--muted);padding-left:12px;position:relative;line-height:1.5}
.col-box ul li::before{content:'›';position:absolute;left:0;color:var(--accent);font-weight:700}
.col-box ul li strong{color:var(--text)}
.bquote{background:var(--s1);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:13px 16px;font-family:var(--ff-h);font-size:clamp(12px,1.8vw,15px);font-weight:600;line-height:1.5;font-style:italic;margin:10px 0}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.g4box{border-radius:10px;padding:12px}
.g4box h3{font-size:11px;font-weight:700;margin-bottom:5px}
.g4box p{font-size:11px;line-height:1.5;opacity:.85}
.stats{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-n{font-family:var(--ff-h);font-size:26px;font-weight:800;color:var(--accent)}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}
.steps{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.step{display:flex;align-items:flex-start;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.step-n{font-family:var(--ff-h);font-size:18px;font-weight:800;color:var(--accent);flex-shrink:0;width:22px;line-height:1}
.step-body h4{font-size:12px;font-weight:600;margin-bottom:2px}
.step-body p{font-size:11px;color:var(--muted);line-height:1.5}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.cbox{border-radius:10px;padding:12px}
.cbox h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.cbox ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.cbox ul li{font-size:11px;color:var(--muted);padding-left:12px;position:relative;line-height:1.4}
.cbox ul li::before{content:'·';position:absolute;left:2px;font-weight:700}

/* ── ACTIVITY SLIDES (projector) ── */
.slide-act h2{font-family:var(--ff-h);font-size:clamp(16px,2.5vw,24px);font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.act-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.act-q{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6}

/* Word cloud projector */
.wc-cloud{background:var(--s1);border:1px solid var(--border);border-radius:14px;min-height:130px;padding:18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;flex:1}
.wc-word{padding:5px 13px;border-radius:20px;font-family:var(--ff-h);font-weight:700;animation:pop .4s ease}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

/* Poll projector */
.poll-bars{display:flex;flex-direction:column;gap:9px;flex:1}
.pbar-row{display:flex;align-items:center;gap:10px}
.pbar-lbl{font-size:12px;color:var(--muted);width:160px;flex-shrink:0;line-height:1.3}
.pbar-track{flex:1;height:32px;background:var(--s2);border-radius:7px;overflow:hidden}
.pbar-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding:0 10px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pbar-fill span{font-size:12px;font-weight:600;color:#fff}
.pbar-n{font-family:var(--ff-h);font-size:14px;font-weight:700;min-width:24px;text-align:right}

/* Quiz projector */
.quiz-proj-q{font-family:var(--ff-h);font-size:clamp(14px,2.2vw,20px);font-weight:700;line-height:1.4;margin-bottom:12px}
.quiz-proj-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.quiz-proj-opt{padding:12px;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;font-size:12px;font-weight:500;text-align:center;line-height:1.35;transition:all .3s}
.quiz-proj-opt.correct{border-color:var(--green);background:rgba(46,204,138,.15);color:var(--green)}
.quiz-proj-opt.voted{border-color:var(--accent);background:var(--ag)}
.proj-timer{font-family:var(--ff-h);font-size:48px;font-weight:800;text-align:center;color:var(--gold);margin:8px 0}
.proj-timer.urg{color:var(--red)}
.proj-ans-ct{font-size:12px;color:var(--muted);text-align:center}
.proj-reveal-btn{width:100%;padding:11px;background:var(--green);border:none;border-radius:10px;color:#fff;font-family:var(--ff-h);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.proj-next-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--ff-h);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 18px var(--ag)}

/* Open responses projector */
.open-wall{display:flex;flex-wrap:wrap;gap:8px;flex:1;align-content:flex-start;overflow-y:auto}
.open-card{background:var(--s2);border-radius:10px;padding:10px 13px;border-left:3px solid var(--accent);font-size:12px;line-height:1.5;animation:pop .4s ease;max-width:280px}
.open-by{font-size:10px;color:var(--muted);margin-bottom:3px}

/* Rating projector */
.rating-proj{display:flex;flex-direction:column;gap:9px;flex:1}
.rproj-row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px}
.rproj-lbl{font-size:12px;font-weight:500;flex:1}
.rproj-stars{font-size:18px;letter-spacing:2px;color:var(--gold)}
.rproj-avg{font-family:var(--ff-h);font-size:14px;font-weight:700;color:var(--gold);min-width:50px;text-align:right}
.rproj-ct{font-size:10px;color:var(--muted);min-width:40px;text-align:right}

/* Leaderboard */
.lb-list{display:flex;flex-direction:column;gap:7px;flex:1}
.lb-row{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:10px 14px;transition:all .4s}
.lb-row.g1{border-color:var(--gold);background:rgba(245,200,66,.07)}
.lb-row.g2{border-color:#b0b0b0}
.lb-row.g3{border-color:#cd7f32}
.lb-rank{font-family:var(--ff-h);font-size:20px;font-weight:800;width:28px;text-align:center;flex-shrink:0}
.lb-name{flex:1;font-size:13px;font-weight:500}
.lb-pts{font-family:var(--ff-h);font-size:18px;font-weight:800;color:var(--accent)}

/* Role play timer */
.rp-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.rp-card{border-radius:12px;padding:14px}
.rp-card h3{font-family:var(--ff-h);font-size:13px;font-weight:700;margin-bottom:8px}
.rp-card ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.rp-card ul li{font-size:11px;color:var(--muted);padding-left:12px;position:relative;line-height:1.5}
.rp-card ul li::before{content:'•';position:absolute;left:2px}
.timer-big{font-family:var(--ff-h);font-size:64px;font-weight:800;text-align:center;line-height:1;margin:8px 0}
.timer-ctrl{display:flex;gap:8px;justify-content:center;margin-top:10px}
.t-btn{padding:9px 18px;border-radius:10px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:var(--ff-h);font-size:13px;font-weight:700;cursor:pointer}
.t-btn.go{background:var(--green);border-color:var(--green);color:#fff}
.t-btn.stop{background:var(--red);border-color:var(--red);color:#fff}

/* ── PHONE VIEW ── */
#phone{display:none;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;width:100%}
.ph-header{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.ph-header h1{font-family:var(--ff-h);font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ph-header p{font-size:11px;color:var(--muted);margin-top:2px}
#ph-body{flex:1;overflow-y:auto;padding:14px}
.ph-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.ph-lbl{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.ph-q{font-family:var(--ff-h);font-size:15px;font-weight:700;line-height:1.4;margin-bottom:14px}
.ph-inp{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;padding:12px 13px;color:var(--text);font-size:14px;outline:none;font-family:var(--ff-b);transition:border-color .2s;margin-bottom:8px}
.ph-inp:focus{border-color:var(--accent)}
.ph-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--ff-h);font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px var(--ag);transition:opacity .15s}
.ph-btn:hover{opacity:.9}
.ph-btn:disabled{opacity:.35;cursor:not-allowed}
.ph-btn.green{background:var(--green);box-shadow:none}
.ph-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ph-opt{padding:13px 8px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:12px;font-weight:500;text-align:center;line-height:1.3;cursor:pointer;transition:all .15s}
.ph-opt:hover:not(:disabled){border-color:var(--accent);background:var(--s3)}
.ph-opt.sel{border-color:var(--accent);background:var(--ag);color:var(--accent)}
.ph-opt.ok{border-color:var(--green)!important;background:rgba(46,204,138,.15)!important;color:var(--green)!important}
.ph-opt.bad{border-color:var(--red)!important;background:rgba(255,91,91,.1)!important;color:var(--red)!important}
.ph-opt:disabled{cursor:default}
.ph-timer-w{height:5px;background:var(--s3);border-radius:3px;margin-bottom:13px;overflow:hidden}
.ph-timer-f{height:100%;background:linear-gradient(90deg,var(--accent),var(--sky));border-radius:3px;transition:width .12s linear}
.ph-result{padding:12px 14px;border-radius:10px;text-align:center;margin-top:8px;font-family:var(--ff-h);font-size:14px;font-weight:700}
.ph-result.ok{background:rgba(46,204,138,.15);color:var(--green);border:1px solid rgba(46,204,138,.3)}
.ph-result.bad{background:rgba(255,91,91,.1);color:var(--red);border:1px solid rgba(255,91,91,.3)}
.ph-score{font-family:var(--ff-h);font-size:36px;font-weight:800;color:var(--gold);text-align:center;margin:8px 0}
.ph-rank{font-size:13px;color:var(--green);text-align:center;font-weight:600}
.ph-stars{display:flex;gap:8px;margin-bottom:4px;justify-content:center}
.ph-star{font-size:28px;cursor:pointer;opacity:.3;transition:all .12s}
.ph-star.on{opacity:1;transform:scale(1.1)}
.wait-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:28px 16px;text-align:center;margin-bottom:12px}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 1.5s infinite}
.ph-name-tag{font-family:var(--ff-h);font-size:18px;font-weight:800;color:var(--accent);background:var(--ag);padding:5px 16px;border-radius:30px;display:inline-block;margin-bottom:10px}
</style>
</head>
<body>

<!-- Auto-detect mode: mobile = teacher, desktop = projector -->

<!-- PROJECTOR -->
<div id="projector">
  <div id="top-nav">
    <button class="sess-pill active" onclick="goSess(0,this)">HOME</button>
    <button class="sess-pill" onclick="goSess(1,this)">S1</button>
    <button class="sess-pill" onclick="goSess(2,this)">S2</button>
    <button class="sess-pill" onclick="goSess(3,this)">S3</button>
    <button class="sess-pill" onclick="goSess(4,this)">S4</button>
    <button class="sess-pill d2" onclick="goSess(5,this)">S5</button>
    <button class="sess-pill d2" onclick="goSess(6,this)">S6</button>
    <button class="sess-pill d2" onclick="goSess(7,this)">S7</button>
    <button class="sess-pill d2" onclick="goSess(8,this)">S8</button>
    <button class="sess-pill demo" onclick="goSess(9,this)">🎓</button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div class="live-badge"><div class="live-dot"></div><span id="live-ct">0 online</span></div>
      <div style="font-family:var(--ff-h);font-size:13px;font-weight:800;color:var(--gold)" id="proj-score-disp">⭐ 0 pts</div>
    </div>
  </div>
  <div id="stage"></div>
  <div id="bot-nav">
    <button class="nav-btn" onclick="prevSlide()">← Prev</button>
    <span id="slide-counter">1 / 1</span>
    <button class="nav-btn primary" onclick="nextSlide()">Next →</button>
  </div>
</div>

<!-- PHONE -->
<div id="phone">
  <div class="ph-header">
    <h1>IGCSE Workshop</h1>
    <p id="ph-sess-label">2-Day Faculty Workshop</p>
  </div>
  <div id="ph-body">
    <!-- join screen -->
    <div id="ph-join">
      <div class="ph-card">
        <div class="ph-lbl">Enter your name to join</div>
        <input class="ph-inp" id="ph-name" type="text" placeholder="Your first name..." maxlength="20" autocomplete="off">
        <button class="ph-btn" onclick="phoneJoin()">Join Workshop →</button>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--muted)" id="ph-join-ct"></div>
    </div>
    <!-- waiting -->
    <div id="ph-wait" style="display:none">
      <div class="wait-card">
        <div class="ph-name-tag" id="ph-ntag"></div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px">You're in the session!</div>
        <div style="font-size:12px;color:var(--muted)"><span class="pulse"></span>Waiting for the host...</div>
      </div>
      <div class="ph-card" style="text-align:center">
        <div style="font-size:11px;color:var(--muted);margin-bottom:5px">Teachers joined</div>
        <div id="ph-online-ct" style="font-family:var(--ff-h);font-size:36px;font-weight:800;color:var(--accent)">0</div>
      </div>
    </div>
    <!-- active activity -->
    <div id="ph-act" style="display:none"></div>
    <!-- submitted -->
    <div id="ph-sub" style="display:none">
      <div class="wait-card">
        <div style="font-size:36px;margin-bottom:8px">✓</div>
        <div style="font-size:14px;font-weight:600;color:var(--green)">Submitted!</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px"><span class="pulse"></span>Waiting for host...</div>
      </div>
    </div>
    <!-- score -->
    <div id="ph-score-screen" style="display:none"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// FIREBASE INIT
// ══════════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyDRD46qTIrqR3XXso6FwTzHupvgaxcTxYg",
  databaseURL: "https://smartugam-6ce65-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smartugam-6ce65",
  authDomain: "smartugam-6ce65.firebaseapp.com",
  storageBucket: "smartugam-6ce65.appspot.com"
});

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let MODE = null;
let myName = null;
let curSess = 0, curSlide = 0;
let rpInterval = null;
let quizTimerInterval = null;
let projQuizState = {};
let phoneHasAnswered = false;
let phoneTimerInterval = null;
let phoneLocalTimer = 0;

// ── Listeners cache to clean up ──
let activeListeners = [];
function offAll() { activeListeners.forEach(fn => fn()); activeListeners = []; }
function listenDB(ref, cb) { ref.on('value', cb); activeListeners.push(() => ref.off('value', cb)); }

// ══════════════════════════════════════════════════════════
// AUTO MODE DETECT
// ══════════════════════════════════════════════════════════
function startMode(mode) {
  MODE = mode;
  document.getElementById('mode-select').style.display = 'none';
  if (mode === 'projector') {
    document.getElementById('projector').style.display = 'flex';
    renderSlide();
    db.ref('online').push({ t: Date.now() });
    listenDB(db.ref('online'), snap => {
      const n = snap.val() ? Object.keys(snap.val()).length : 0;
      const el = document.getElementById('live-ct');
      if (el) el.textContent = n + ' online';
    });
    // Watch session for phone scores on projector leaderboard
    listenDB(db.ref('scores'), snap => {
      const el = document.getElementById('proj-score-disp');
      if (el && snap.val()) {
        const total = Object.values(snap.val()).reduce((a, b) => a + b, 0);
        el.textContent = '⭐ ' + total + ' pts total';
      }
    });
  } else {
    document.getElementById('phone').style.display = 'flex';
    // Watch online count for phone join screen
    listenDB(db.ref('online'), snap => {
      const n = snap.val() ? Object.keys(snap.val()).length : 0;
      const el1 = document.getElementById('ph-join-ct');
      const el2 = document.getElementById('ph-online-ct');
      if (el1) el1.textContent = n > 0 ? n + ' already joined' : '';
      if (el2) el2.textContent = n;
    });
    // Watch active activity
    listenDB(db.ref('activeActivity'), snap => {
      const act = snap.val();
      if (!act || !myName) return;
      // Update session label
      const sl = document.getElementById('ph-sess-label');
      if (sl) sl.textContent = act.sessLabel || 'Workshop';
      // Check if we already answered
      db.ref('actAnswers/' + act.id + '/' + safeKey(myName)).once('value', asnap => {
        if (asnap.val()) { phShow('ph-sub'); return; }
        phoneHasAnswered = false;
        renderPhoneActivity(act);
      });
    });
    // Watch quiz reveal
    listenDB(db.ref('quizReveal'), snap => {
      const rv = snap.val();
      if (!rv || !myName) return;
      showPhoneQuizResult(rv);
    });
  }
}

function safeKey(name) { return name.replace(/[.#$[\]]/g, '_'); }

// ══════════════════════════════════════════════════════════
// PHONE — JOIN
// ══════════════════════════════════════════════════════════
function phoneJoin() {
  const v = document.getElementById('ph-name').value.trim();
  if (!v) { document.getElementById('ph-name').focus(); return; }
  myName = v;
  db.ref('online/' + safeKey(myName)).set({ name: myName, t: Date.now() });
  db.ref('scores/' + safeKey(myName)).transaction(c => c === null ? 0 : c);
  document.getElementById('ph-join').style.display = 'none';
  document.getElementById('ph-ntag').textContent = myName;
  document.getElementById('ph-wait').style.display = 'block';
  // check if activity already active
  db.ref('activeActivity').once('value', snap => {
    const act = snap.val();
    if (act) {
      const sl = document.getElementById('ph-sess-label');
      if (sl) sl.textContent = act.sessLabel || 'Workshop';
      db.ref('actAnswers/' + act.id + '/' + safeKey(myName)).once('value', asnap => {
        if (!asnap.val()) { phoneHasAnswered = false; renderPhoneActivity(act); }
        else phShow('ph-sub');
      });
    }
  });
}

function phShow(id) {
  ['ph-join','ph-wait','ph-act','ph-sub','ph-score-screen'].forEach(x => {
    const el = document.getElementById(x);
    if (el) el.style.display = 'none';
  });
  const el = document.getElementById(id);
  if (el) el.style.display = 'block';
}

// ── PHONE RENDER ACTIVITY ──
function renderPhoneActivity(act) {
  if (!myName) return;
  phShow('ph-act');
  const wrap = document.getElementById('ph-act');
  clearInterval(phoneTimerInterval);

  if (act.type === 'wordcloud') {
    wrap.innerHTML = `<div class="ph-card">
      <div class="ph-lbl">Word Cloud</div>
      <div class="ph-q">${act.q}</div>
      <input class="ph-inp" id="ph-wc1" type="text" placeholder="Word 1..." maxlength="20" autocomplete="off">
      <input class="ph-inp" id="ph-wc2" type="text" placeholder="Word 2 (optional)..." maxlength="20" autocomplete="off">
      <button class="ph-btn" onclick="phSubmitWC('${act.id}')">Submit →</button>
    </div>`;
  } else if (act.type === 'poll') {
    wrap.innerHTML = `<div class="ph-card">
      <div class="ph-lbl">Poll</div>
      <div class="ph-q">${act.q}</div>
      <div class="ph-opts">${act.opts.map((o, i) => `<button class="ph-opt" onclick="phSubmitPoll('${act.id}',${i},this)">${o}</button>`).join('')}</div>
    </div>`;
  } else if (act.type === 'quiz') {
    renderPhoneQuiz(act);
  } else if (act.type === 'open') {
    wrap.innerHTML = `<div class="ph-card">
      <div class="ph-lbl">${act.badge || 'Open Response'}</div>
      <div class="ph-q">${act.q}</div>
      <textarea class="ph-inp" id="ph-open-ta" rows="4" maxlength="200" placeholder="Type your response..." style="resize:none"></textarea>
      <button class="ph-btn" onclick="phSubmitOpen('${act.id}')">Submit →</button>
    </div>`;
  } else if (act.type === 'rating') {
    const aspects = act.aspects || [];
    wrap.innerHTML = `<div class="ph-card">
      <div class="ph-lbl">Rating</div>
      <div class="ph-q">${act.q}</div>
      ${aspects.map((a, i) => `<div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">${a}</div>
        <div class="ph-stars">${[1,2,3,4,5].map(n => `<span class="ph-star" onclick="phPickStar(${i},${n})" data-asp="${i}" data-val="${n}">★</span>`).join('')}</div>
      </div>`).join('')}
      <button class="ph-btn" onclick="phSubmitRating('${act.id}',${aspects.length})">Submit →</button>
    </div>`;
  }
}

function renderPhoneQuiz(act) {
  const wrap = document.getElementById('ph-act');
  const qIdx = act.qIdx || 0;
  const qdata = act.qs[qIdx];
  phoneLocalTimer = act.timerLeft !== undefined ? act.timerLeft : act.timer;
  const tot = act.timer;
  wrap.innerHTML = `<div class="ph-card">
    <div class="ph-lbl">Quiz · Q${qIdx+1} of ${act.qs.length}</div>
    <div class="ph-q">${qdata.q}</div>
    <div class="ph-timer-w"><div class="ph-timer-f" id="ph-tf" style="width:${(phoneLocalTimer/tot)*100}%"></div></div>
    <div class="ph-opts">${qdata.opts.map((o, i) => `<button class="ph-opt" onclick="phSubmitQuiz('${act.id}',${i},${qIdx},this)">${o}</button>`).join('')}</div>
  </div>`;
  clearInterval(phoneTimerInterval);
  phoneTimerInterval = setInterval(() => {
    phoneLocalTimer = Math.max(0, phoneLocalTimer - 0.15);
    const el = document.getElementById('ph-tf');
    if (el) el.style.width = (phoneLocalTimer / tot * 100) + '%';
    if (phoneLocalTimer <= 0) clearInterval(phoneTimerInterval);
  }, 150);
}

function phPickStar(aspIdx, val) {
  document.querySelectorAll(`.ph-star[data-asp="${aspIdx}"]`).forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.val) <= val);
  });
}

// ── PHONE SUBMITS ──
function phSubmitWC(actId) {
  const w1 = (document.getElementById('ph-wc1') || {value:''}).value.trim();
  const w2 = (document.getElementById('ph-wc2') || {value:''}).value.trim();
  if (!w1) return;
  const words = [w1, w2].filter(Boolean);
  const key = safeKey(myName);
  db.ref('actAnswers/' + actId + '/' + key).set({ type: 'wordcloud', words, name: myName });
  words.forEach(w => {
    const wk = w.toLowerCase().replace(/[.#$[\]]/g, '_');
    db.ref('wcWords/' + actId + '/' + wk).transaction(c => (c || 0) + 1);
  });
  phoneHasAnswered = true;
  phShow('ph-sub');
}

function phSubmitPoll(actId, idx, btn) {
  if (phoneHasAnswered) return;
  phoneHasAnswered = true;
  const key = safeKey(myName);
  db.ref('actAnswers/' + actId + '/' + key).set({ type: 'poll', option: idx, name: myName });
  db.ref('pollVotes/' + actId + '/' + idx).transaction(c => (c || 0) + 1);
  btn.classList.add('sel');
  document.querySelectorAll('.ph-opt').forEach(b => b.disabled = true);
  setTimeout(() => phShow('ph-sub'), 350);
}

function phSubmitQuiz(actId, chosen, qIdx, btn) {
  if (phoneHasAnswered) return;
  phoneHasAnswered = true;
  clearInterval(phoneTimerInterval);
  const key = safeKey(myName);
  db.ref('actAnswers/' + actId + '/' + key).set({ type: 'quiz', option: chosen, qIdx, name: myName, timeLeft: Math.round(phoneLocalTimer) });
  btn.classList.add('sel');
  document.querySelectorAll('.ph-opt').forEach(b => b.disabled = true);
  phShow('ph-sub');
}

function phSubmitOpen(actId) {
  const ta = document.getElementById('ph-open-ta');
  if (!ta || !ta.value.trim()) return;
  const key = safeKey(myName);
  db.ref('actAnswers/' + actId + '/' + key).set({ type: 'open', text: ta.value.trim(), name: myName });
  db.ref('openResponses/' + actId).push({ text: ta.value.trim(), name: myName });
  phoneHasAnswered = true;
  phShow('ph-sub');
}

function phSubmitRating(actId, n) {
  const ratings = {};
  for (let i = 0; i < n; i++) {
    const stars = document.querySelectorAll(`.ph-star[data-asp="${i}"].on`);
    ratings[i] = stars.length;
  }
  const key = safeKey(myName);
  db.ref('actAnswers/' + actId + '/' + key).set({ type: 'rating', ratings, name: myName });
  // accumulate averages
  db.ref('ratingData/' + actId).transaction(cur => {
    const d = cur || {};
    for (let i = 0; i < n; i++) {
      if (!d[i]) d[i] = { sum: 0, count: 0 };
      d[i].sum = (d[i].sum || 0) + (ratings[i] || 0);
      d[i].count = (d[i].count || 0) + 1;
    }
    return d;
  });
  phoneHasAnswered = true;
  phShow('ph-sub');
}

function showPhoneQuizResult(rv) {
  clearInterval(phoneTimerInterval);
  phShow('ph-score-screen');
  const wrap = document.getElementById('ph-score-screen');
  db.ref('actAnswers/' + rv.actId + '/' + safeKey(myName)).once('value', snap => {
    const ans = snap.val();
    const myOpt = ans ? ans.option : -1;
    const correct = myOpt === rv.correctAns;
    db.ref('scores/' + safeKey(myName)).once('value', ss => {
      const score = ss.val() || 0;
      db.ref('scores').once('value', allSnap => {
        const all = allSnap.val() || {};
        const sorted = Object.values(all).sort((a, b) => b - a);
        const myScore = all[safeKey(myName)] || 0;
        const pos = sorted.indexOf(myScore) + 1;
        wrap.innerHTML = `<div class="ph-card" style="text-align:center;padding:24px">
          <div style="font-size:36px;margin-bottom:8px">${correct ? '✅' : '❌'}</div>
          <div style="font-size:14px;font-weight:600;color:${correct?'var(--green)':'var(--red)'}">${correct ? 'Correct!' : 'Not quite'}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">Answer: ${rv.correctOpt}</div>
          <div class="ph-score" style="margin-top:16px">${myScore}</div>
          <div style="font-size:12px;color:var(--muted)">total points</div>
          <div class="ph-rank">You are #${pos} on the leaderboard</div>
          <button class="ph-btn" style="margin-top:16px" onclick="phShow('ph-sub')">← Back to waiting</button>
        </div>`;
        phoneHasAnswered = false;
      });
    });
  });
}

// ══════════════════════════════════════════════════════════
// PROJECTOR — RENDER SLIDE
// ══════════════════════════════════════════════════════════
function renderSlide() {
  const slides = SESSIONS[curSess];
  const slide = slides[curSlide];
  const stage = document.getElementById('stage');
  offAll(); // clean listeners
  if (MODE === 'projector') {
    // Re-add global listeners
    listenDB(db.ref('online'), snap => {
      const n = snap.val() ? Object.keys(snap.val()).length : 0;
      const el = document.getElementById('live-ct');
      if (el) el.textContent = n + ' online';
    });
    listenDB(db.ref('scores'), snap => {
      const el = document.getElementById('proj-score-disp');
      if (el && snap.val()) {
        const total = Object.values(snap.val()).reduce((a, b) => a + b, 0);
        el.textContent = '⭐ ' + total + ' pts total';
      }
    });
  }
  stage.innerHTML = buildSlideHTML(slide);
  const s = stage.querySelector('.slide');
  if (s) { s.style.opacity='0'; s.style.transform='translateX(30px)'; requestAnimationFrame(()=>{ s.style.transition='opacity .3s,transform .3s'; s.style.opacity='1'; s.style.transform='none'; }); }
  document.getElementById('slide-counter').textContent = (curSlide + 1) + ' / ' + slides.length;
  // if activity, push to Firebase so phones know
  if (slide.type === 'activity') pushActivity(slide);
  // start live listeners for activity slides
  if (slide.type === 'activity') startProjListeners(slide);
}

function pushActivity(slide) {
  const sessLabel = SESSIONS[curSess][0].type === 'section'
    ? (SESSIONS[curSess][0].label || 'S' + curSess) + ' ' + SESSIONS[curSess][0].title
    : 'Session ' + curSess;
  const payload = {
    id: slide.id, type: slide.actType, q: slide.q, badge: slide.badge,
    sessLabel: sessLabel, timer: slide.timer || 20
  };
  if (slide.actType === 'poll') payload.opts = slide.opts;
  if (slide.actType === 'quiz') { payload.qs = slide.qs; payload.qIdx = projQuizState[slide.id]?.qIdx || 0; payload.timerLeft = slide.timer || 20; }
  if (slide.actType === 'rating') payload.aspects = slide.aspects;
  db.ref('activeActivity').set(payload);
  db.ref('quizReveal').remove();
}

function startProjListeners(slide) {
  if (slide.actType === 'wordcloud') {
    listenDB(db.ref('wcWords/' + slide.id), snap => {
      const words = snap.val() || {};
      const sorted = Object.entries(words).sort((a, b) => b[1] - a[1]);
      const cloud = document.getElementById('proj-wc-' + slide.id);
      if (!cloud) return;
      if (!sorted.length) { cloud.innerHTML = '<div style="color:var(--muted);font-size:13px">Waiting for words...</div>'; return; }
      cloud.innerHTML = sorted.map(([w, c], i) => {
        const sz = Math.max(14, Math.min(36, 14 + c * 4));
        return `<div class="wc-word" style="font-size:${sz}px;color:${WC_COLORS[i % WC_COLORS.length]};background:${WC_COLORS[i % WC_COLORS.length]}22">${w}</div>`;
      }).join('');
    });
    listenDB(db.ref('actAnswers/' + slide.id), snap => updateSubmittedCount(snap));
  } else if (slide.actType === 'poll') {
    listenDB(db.ref('pollVotes/' + slide.id), snap => {
      const votes = snap.val() || {};
      const total = Object.values(votes).reduce((a, b) => a + b, 0) || 1;
      slide.opts.forEach((opt, i) => {
        const cnt = votes[i] || 0;
        const pct = Math.round((cnt / total) * 100);
        const fill = document.getElementById('pb-fill-' + i);
        const pctEl = document.getElementById('pb-pct-' + i);
        const nEl = document.getElementById('pb-n-' + i);
        if (fill) fill.style.width = pct + '%';
        if (pctEl) pctEl.textContent = pct + '%';
        if (nEl) nEl.textContent = cnt;
      });
    });
    listenDB(db.ref('actAnswers/' + slide.id), snap => updateSubmittedCount(snap));
  } else if (slide.actType === 'open') {
    listenDB(db.ref('openResponses/' + slide.id), snap => {
      const wall = document.getElementById('proj-open-' + slide.id);
      if (!wall) return;
      const items = snap.val() ? Object.values(snap.val()) : [];
      wall.innerHTML = items.map(r => `<div class="open-card"><div class="open-by">${r.name}</div>${r.text}</div>`).join('');
    });
    listenDB(db.ref('actAnswers/' + slide.id), snap => updateSubmittedCount(snap));
  } else if (slide.actType === 'rating') {
    listenDB(db.ref('ratingData/' + slide.id), snap => {
      const data = snap.val() || {};
      (slide.aspects || []).forEach((asp, i) => {
        const d = data[i];
        const avg = d && d.count ? (d.sum / d.count).toFixed(1) : '—';
        const filled = d && d.count ? Math.round(d.sum / d.count) : 0;
        const se = document.getElementById('rstar-' + i);
        const ae = document.getElementById('ravg-' + i);
        const ce = document.getElementById('rct-' + i);
        if (se) se.textContent = '★'.repeat(filled) + '☆'.repeat(5 - filled);
        if (ae) ae.textContent = avg !== '—' ? avg + ' / 5' : '—';
        if (ce) ce.textContent = d ? d.count + ' votes' : '';
      });
    });
    listenDB(db.ref('actAnswers/' + slide.id), snap => updateSubmittedCount(snap));
  } else if (slide.actType === 'quiz') {
    startProjQuiz(slide);
  }
}

function updateSubmittedCount(snap) {
  const el = document.getElementById('proj-sub-ct');
  if (!el) return;
  db.ref('online').once('value', os => {
    const total = os.val() ? Object.keys(os.val()).length : 0;
    const submitted = snap.val() ? Object.keys(snap.val()).length : 0;
    el.textContent = submitted + ' / ' + total + (submitted >= total && total > 0 ? ' ✓ All submitted' : ' submitted');
  });
}

// ── PROJECTOR QUIZ ──
function startProjQuiz(slide) {
  if (!projQuizState[slide.id]) projQuizState[slide.id] = { qIdx: 0 };
  const state = projQuizState[slide.id];
  const qIdx = state.qIdx;
  const qdata = slide.qs[qIdx];
  let t = slide.timer || 20;
  clearInterval(quizTimerInterval);
  // Update timer bar and number on projector
  const updateTimer = () => {
    const el = document.getElementById('proj-qtimer');
    if (el) { el.textContent = t; el.className = 'proj-timer' + (t <= 5 ? ' urg' : ''); }
  };
  updateTimer();
  quizTimerInterval = setInterval(() => {
    t--;
    updateTimer();
    db.ref('activeActivity/timerLeft').set(t);
    if (t <= 0) { clearInterval(quizTimerInterval); projRevealAnswer(slide, qIdx); }
  }, 1000);
  // Live answer count
  listenDB(db.ref('actAnswers/' + slide.id), snap => updateSubmittedCount(snap));
}

function projRevealAnswer(slide, qIdx) {
  clearInterval(quizTimerInterval);
  const qdata = slide.qs[qIdx];
  // Mark correct option
  slide.opts && slide.opts.forEach && null; // no-op
  const opts = document.querySelectorAll('.quiz-proj-opt');
  opts.forEach((el, i) => { if (i === qdata.ans) el.classList.add('correct'); });
  // Score players
  db.ref('actAnswers/' + slide.id).once('value', snap => {
    const answers = snap.val() || {};
    Object.entries(answers).forEach(([key, ans]) => {
      if (ans.type === 'quiz' && ans.qIdx === qIdx && ans.option === qdata.ans) {
        const bonus = (ans.timeLeft || 0) * 15;
        db.ref('scores/' + key).transaction(c => (c || 0) + 100 + bonus);
      }
    });
    // Push reveal to phones
    db.ref('quizReveal').set({ actId: slide.id, qIdx, correctAns: qdata.ans, correctOpt: qdata.opts[qdata.ans] });
  });
  // Show next/finish buttons
  const revBtn = document.getElementById('proj-rev-btn');
  if (revBtn) revBtn.style.display = 'none';
  const nextBtn = document.getElementById('proj-qnext-btn');
  if (nextBtn) nextBtn.style.display = 'block';
}

function projNextQuestion(slide) {
  const state = projQuizState[slide.id];
  state.qIdx++;
  if (state.qIdx >= slide.qs.length) {
    // quiz done
    const nb = document.getElementById('proj-qnext-btn');
    if (nb) nb.textContent = '✓ Quiz Complete — go to Next Slide';
    return;
  }
  // re-render quiz section
  const qdata = slide.qs[state.qIdx];
  const qtxt = document.getElementById('proj-qtxt');
  const qopts = document.getElementById('proj-qopts');
  const qprog = document.getElementById('proj-qprog');
  if (qtxt) qtxt.textContent = qdata.q;
  if (qprog) qprog.textContent = 'Question ' + (state.qIdx+1) + ' of ' + slide.qs.length;
  if (qopts) qopts.innerHTML = qdata.opts.map((o, i) => `<div class="quiz-proj-opt" id="qpo${i}">${o}</div>`).join('');
  db.ref('quizReveal').remove();
  db.ref('actAnswers/' + slide.id).remove();
  // Update active activity qIdx
  db.ref('activeActivity/qIdx').set(state.qIdx);
  db.ref('activeActivity/timerLeft').set(slide.timer || 20);
  const revBtn = document.getElementById('proj-rev-btn');
  if (revBtn) revBtn.style.display = 'block';
  const nextBtn = document.getElementById('proj-qnext-btn');
  if (nextBtn) nextBtn.style.display = 'none';
  startProjQuiz(slide);
}

// ══════════════════════════════════════════════════════════
// SLIDE HTML BUILDER
// ══════════════════════════════════════════════════════════
function buildSlideHTML(slide) {
  if (slide.type === 'title') {
    return `<div class="slide slide-title">
      <div class="eyebrow">${slide.eyebrow}</div>
      <h1>${slide.headline.replace(/\n/g,'<br>').replace('Classroom','<span>Classroom</span>').replace('Mastery','<span>Mastery</span>').replace('Workshop','<span>Workshop</span>').replace('ready for','<span>ready for</span>').replace('your class.','<span>your class.</span>')}</h1>
      <div class="tagline">${slide.sub}</div>
      ${slide.chips&&slide.chips.length?`<div class="chips">${slide.chips.map(c=>`<div class="chip">${c}</div>`).join('')}</div>`:''}
    </div>`;
  }
  if (slide.type === 'section') {
    return `<div class="slide slide-section">
      <div class="sect-eye" style="color:${slide.col}">${slide.eye}</div>
      <div class="sect-num">${slide.num}</div>
      <div style="font-family:var(--ff-h);font-size:clamp(13px,2vw,18px);color:${slide.col};font-weight:700;margin-bottom:6px">${slide.day}</div>
      <div class="sect-title">${slide.title}</div>
      <div style="font-family:var(--ff-h);font-size:clamp(14px,2.5vw,22px);color:${slide.col};font-weight:700;margin-bottom:8px">${slide.sub}</div>
      <div class="sect-sub">Focus: ${slide.dur}</div>
      <div class="dur-pill">${slide.dur}</div>
    </div>`;
  }
  if (slide.type === 'content') {
    let body = '';
    for (const b of (slide.body || [])) {
      if (b.t === 'cols2') body += `<div class="cols2">${b.cols.map(c=>`<div class="col-box" style="background:${c.color}"><h3 style="color:${c.tc}">${c.title}</h3><ul>${c.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}</div>`;
      else if (b.t === 'grid4') body += `<div class="grid4">${b.items.map(i=>`<div class="g4box" style="background:${i.color}"><h3 style="color:${i.tc}">${i.title}</h3><p>${i.text}</p></div>`).join('')}</div>`;
      else if (b.t === 'compare') body += `<div class="compare"><div class="cbox" style="background:${b.left.color}"><h3 style="color:${b.left.hc}">${b.left.title}</h3><ul>${b.left.items.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class="cbox" style="background:${b.right.color}"><h3 style="color:${b.right.hc}">${b.right.title}</h3><ul>${b.right.items.map(i=>`<li>${i}</li>`).join('')}</ul></div></div>`;
      else if (b.t === 'quote') body += `<div class="bquote">${b.text}</div>`;
      else if (b.t === 'stats') body += `<div class="stats">${b.stats.map(s=>`<div class="stat"><div class="stat-n">${s.n}</div><div class="stat-l">${s.l.replace(/\n/g,'<br>')}</div></div>`).join('')}</div>`;
      else if (b.t === 'steps') body += `<div class="steps">${b.steps.map(s=>`<div class="step"><div class="step-n">${s.n}</div><div class="step-body"><h4>${s.title}</h4><p>${s.body}</p></div></div>`).join('')}</div>`;
    }
    return `<div class="slide slide-content"><h2>${slide.h}</h2>${body}</div>`;
  }
  if (slide.type === 'activity') {
    return buildActivityHTML(slide);
  }
  if (slide.type === 'roleplay') {
    const dur = slide.duration || 120;
    const mm = Math.floor(dur/60), ss = String(dur%60).padStart(2,'0');
    return `<div class="slide slide-act">
      <span class="act-badge" style="background:${slide.bc}22;color:${slide.bc};border:1px solid ${slide.bc}44">${slide.badge}</span>
      <h2 style="margin-top:8px">${slide.title}</h2>
      <div class="act-q">${slide.sub}</div>
      <div class="rp-cards">${slide.cards.map(c=>`<div class="rp-card" style="background:${c.color}"><h3 style="color:${c.tc}">${c.title}</h3><ul>${c.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}</div>
      <div class="timer-big" id="rp-timer">${mm}:${ss}</div>
      <div class="timer-ctrl">
        <button class="t-btn go" onclick="rpStart(${dur})">▶ Start</button>
        <button class="t-btn" onclick="rpPause()">⏸ Pause</button>
        <button class="t-btn stop" onclick="rpReset(${dur})">↺ Reset</button>
      </div>
    </div>`;
  }
  if (slide.type === 'leaderboard') {
    return `<div class="slide slide-act">
      <span class="act-badge" style="background:${slide.bc}22;color:${slide.bc};border:1px solid ${slide.bc}44">${slide.badge}</span>
      <h2 style="margin-top:8px">${slide.title}</h2>
      <div class="lb-list" id="proj-lb"></div>
    </div>`;
  }
  return `<div class="slide slide-title"><h1>Slide</h1></div>`;
}

function buildActivityHTML(slide) {
  const actType = slide.actType;
  let inner = '';
  if (actType === 'wordcloud') {
    inner = `<div class="wc-cloud" id="proj-wc-${slide.id}"><div style="color:var(--muted);font-size:13px">Waiting for words from teachers...</div></div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px" id="proj-sub-ct">0 submitted</div>`;
  } else if (actType === 'poll') {
    inner = `<div class="poll-bars">${(slide.opts||[]).map((o,i)=>`<div class="pbar-row">
      <div class="pbar-lbl">${o}</div>
      <div class="pbar-track"><div class="pbar-fill" id="pb-fill-${i}" style="width:0%;background:${WC_COLORS[i%WC_COLORS.length]}"><span id="pb-pct-${i}">0%</span></div></div>
      <div class="pbar-n" id="pb-n-${i}">0</div>
    </div>`).join('')}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px" id="proj-sub-ct">0 submitted</div>`;
  } else if (actType === 'quiz') {
    const state = projQuizState[slide.id] || { qIdx: 0 };
    const qIdx = state.qIdx;
    const qdata = slide.qs[qIdx];
    inner = `<div class="quiz-proj-q" id="proj-qtxt">${qdata.q}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px" id="proj-qprog">Question ${qIdx+1} of ${slide.qs.length}</div>
      <div class="quiz-proj-opts" id="proj-qopts">${qdata.opts.map((o,i)=>`<div class="quiz-proj-opt" id="qpo${i}">${o}</div>`).join('')}</div>
      <div class="proj-timer" id="proj-qtimer">${slide.timer||20}</div>
      <div class="proj-ans-ct" id="proj-sub-ct">0 answered</div>
      <button class="proj-reveal-btn" id="proj-rev-btn" onclick="projRevealAnswer(SESSIONS[${curSess}][${curSlide}],${projQuizState[slide.id]?.qIdx||0})">⏱ Reveal Answer & Score</button>
      <button class="proj-next-btn" id="proj-qnext-btn" style="display:none" onclick="projNextQuestion(SESSIONS[${curSess}][${curSlide}])">Next Question →</button>`;
  } else if (actType === 'open') {
    inner = `<div class="open-wall" id="proj-open-${slide.id}"><div style="color:var(--muted);font-size:13px">Waiting for responses...</div></div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px" id="proj-sub-ct">0 submitted</div>`;
  } else if (actType === 'rating') {
    inner = `<div class="rating-proj">${(slide.aspects||[]).map((a,i)=>`<div class="rproj-row">
      <div class="rproj-lbl">${a}</div>
      <div class="rproj-stars" id="rstar-${i}">☆☆☆☆☆</div>
      <div class="rproj-avg" id="ravg-${i}">—</div>
      <div class="rproj-ct" id="rct-${i}"></div>
    </div>`).join('')}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px" id="proj-sub-ct">0 submitted</div>`;
  }
  return `<div class="slide slide-act">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span class="act-badge" style="background:${slide.bc}22;color:${slide.bc};border:1px solid ${slide.bc}44">${slide.badge}</span>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
    </div>
    <h2>${slide.title}</h2>
    <div class="act-q">${slide.q}</div>
    ${inner}
  </div>`;
}

// ══════════════════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════════════════
function loadLeaderboard() {
  db.ref('scores').once('value', snap => {
    const scores = snap.val() || {};
    const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    const lb = document.getElementById('proj-lb');
    if (!lb) return;
    const medals = ['🥇','🥈','🥉'];
    const cls = ['g1','g2','g3'];
    lb.innerHTML = sorted.length
      ? sorted.map(([key, pts], i) => `<div class="lb-row ${cls[i]||''}"><div class="lb-rank">${medals[i]||i+1}</div><div class="lb-name">${key.replace(/_/g,' ')}</div><div class="lb-pts">${pts} pts</div></div>`).join('')
      : '<div style="color:var(--muted);text-align:center;padding:20px">No scores yet — complete a quiz!</div>';
  });
}

// ══════════════════════════════════════════════════════════
// ROLE PLAY TIMER
// ══════════════════════════════════════════════════════════
function rpStart(total) {
  let left = parseInt(document.getElementById('rp-timer').textContent.split(':').join('')) || total;
  // parse mm:ss
  const parts = document.getElementById('rp-timer').textContent.split(':');
  left = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  clearInterval(rpInterval);
  rpInterval = setInterval(() => {
    left--;
    const el = document.getElementById('rp-timer');
    if (el) { el.textContent = Math.floor(left/60)+':'+String(left%60).padStart(2,'0'); if(left<=10) el.style.color='var(--red)'; }
    if (left <= 0) clearInterval(rpInterval);
  }, 1000);
}
function rpPause() { clearInterval(rpInterval); }
function rpReset(total) {
  clearInterval(rpInterval);
  const el = document.getElementById('rp-timer');
  if (el) { el.textContent = Math.floor(total/60)+':'+String(total%60).padStart(2,'0'); el.style.color='var(--text)'; }
}

// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
function goSess(idx, btn) {
  curSess = idx; curSlide = 0;
  clearInterval(quizTimerInterval);
  document.querySelectorAll('.sess-pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderSlide();
  if (idx === 9) setTimeout(loadLeaderboard, 300); // demo class — load lb
}

function nextSlide() {
  clearInterval(quizTimerInterval);
  const slides = SESSIONS[curSess];
  if (curSlide < slides.length - 1) { curSlide++; renderSlide(); }
  else {
    const next = curSess + 1;
    if (next < SESSIONS.length) { const pills = document.querySelectorAll('.sess-pill'); goSess(next, pills[next]); }
  }
  if (SESSIONS[curSess][curSlide]?.type === 'leaderboard') setTimeout(loadLeaderboard, 300);
}

function prevSlide() {
  clearInterval(quizTimerInterval);
  if (curSlide > 0) { curSlide--; renderSlide(); }
  else if (curSess > 0) {
    curSess--; curSlide = SESSIONS[curSess].length - 1;
    const pills = document.querySelectorAll('.sess-pill');
    pills.forEach(b => b.classList.remove('active'));
    pills[curSess].classList.add('active');
    renderSlide();
  }
}

document.addEventListener('keydown', e => {
  if (MODE !== 'projector') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
});

// ── AUTO DETECT MODE ON LOAD ──
(function autoDetect() {
  // Mobile = screen width <= 768px OR touch-primary device
  const isMobile = window.innerWidth <= 768 || ('ontouchstart' in window && window.innerWidth <= 1024);
  startMode(isMobile ? 'phone' : 'projector');
})();
</script>
